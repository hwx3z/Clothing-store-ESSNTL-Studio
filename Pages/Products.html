<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
</head>
<body>
    <link href="/src/Productsstyles.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
</head>
<body>
    
    <div class="IconShop">
            <i class="fa-solid fa-shop">ESSNTL Studio</i>
    </div>
    <header>
      <div class="cart-icon">
  <a href="cart.html">🛒 <span id="cart-count">0</span></a>
</div>
    </header>

    <div>
        <h2>Here you found our products!</h2>
    </Div>
    <div class="Buttons">
        <a href="/index.html"><button id="Home">Home</button></a>
        <a href="Products.html"><button id="Products">Products</button></a>
        <a href="SocialMedia.html"><button id="SocialMedia">Social Media</button></a>
    </div>

    <section class="products-list">
  <h2 class="section-title">PRODUCTS</h2>

  <div class="product-item">
    <img src="T-SHIRST ESSENTIAL.png" alt="Produto">
    
    <div class="product-info">
      <h3>T-Shirt Essential</h3>
      <p class="desc">A basic piece with a perfect fit and premium fabric.</p>
      <p class="price">$ 129,90</p>
      <button>Comprar</button>
      <button onclick="addToCart('T-Shirt Essential', 129.90, 'T-SHIRST ESSENTIAL.png')">
  Adicionar ao carrinho
</button>
    </div>
  </div>

  <div class="product-item">
    <img src="Hoodie Premium.png" alt="Produto">
    
    <div class="product-info">
      <h3>Hoodie Premium</h3>
      <p class="desc">Comfort and style for everyday wear.</p>
      <p class="price">$ 249,90</p>
      <button>Comprar</button>
      <button onclick="addToCart('Hoodie Premium', 249.90, 'Hoodie Premium.png')">
  Adicionar ao carrinho
</button>
    </div>
  </div>

  <div class="product-item">
    <img src="Pants Minimal.png" alt="Produto">
    
    <div class="product-info">
      <h3>Pants Minimal</h3>
      <p class="desc">Versatility with a modern design.</p>
      <p class="price">$ 199,90</p>
      <button>Comprar</button>
      <button onclick="addToCart('Pants Minimal', 199.90, 'Pants Minimal.png')">
  Adicionar ao carrinho
</button>
    </div>
  </div>
</section>
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price, image) {
  const product = { name, price, image };

  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));

  alert(name + " adicionado ao carrinho!");
  updateCartCount();
}

function updateCartCount() {
  const cartCount = document.getElementById("cart-count");
  if (cartCount) {
    cartCount.innerText = cart.length;
  }
}

updateCartCount();
</script>
</body>
</html>
